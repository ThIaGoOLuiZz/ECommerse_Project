<div class="login-page">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="row w-100 login-row justify-content-center">
            <div class="col-12">
                <p-card class="h-100 d-flex without-color">
                    <div class="row h-100 container justify-content-center align-items-center">
                        <div class="col-5 h-100 rounded-start-5" style="background-color: #6cbaa4;"></div>
                        <div class="col-7 h-100 rounded-end-5" style="background-color: white;">
                            <div class="h-100 d-flex justify-content-center align-items-center">
                                <div class="d-flex flex-column h-75 w-75 justify-content-center">
                                    <div class="container h-25 d-flex justify-content-center bg-dark">
                                        <h1 class="text-center mb-4">Login</h1>
                                    </div>
                                    <div class="h-75 bg-info">
                                        <p-floatlabel variant="in">
                                            <p-iconfield>
                                                <p-inputicon class="pi pi-envelope"/>
                                                <input pInputText id="email" [(ngModel)]="value1" autocomplete="off" class="w-100"/>
                                            </p-iconfield>
                                            <label for="email">E-mail</label>
                                        </p-floatlabel>
                                        
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </p-card>
            </div>
        </div>
    </div>
</div>
