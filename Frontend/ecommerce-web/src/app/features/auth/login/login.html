<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-75 login__container shadow">
        <section class="col-md-6 h-100">
        </section>
        <section class="col-md-6 h-100 d-flex flex-column align-items-center justify-content-center">
            <div class="h-0 w-75 d-flex flex-row justify-content-between m">
                <h1 class="text-center fw-bold">Login</h1>
                <div class="d-flex flex-row align-items-center">
                    <i class="pi pi-linkedin opacity-50 me-2"></i>
                    <i class="pi pi-envelope opacity-50"></i>
                </div>
            </div>
            <div class="py-4 w-75 d-flex flex-column align-items-center justify-content-end">
                <p-floatlabel variant="in" class="w-100">
                    <input 
                        pInputText 
                        id="email" 
                        [(ngModel)]="email" 
                        autocomplete="off" 
                        class="w-100"/>
                    <label for="email">E-mail</label>
                </p-floatlabel>
                <p-floatlabel variant="in" class="w-100 mt-3">
                    <p-password 
                        [(ngModel)]="password" 
                        [feedback]="false" 
                        inputId="password" 
                        autocomplete="off" 
                        class="w-100"/>
                    <label for="password">Password</label>
                </p-floatlabel>
                <div class="w-100 mt-1 d-flex justify-content-end">
                    <a href="http://" target="_blank" class="login__forgot-password">
                        Forgot your password?
                    </a>
                </div>
                <p-button label="Login" [rounded]="true" class="w-100 d-flex justify-content-center mt-4"/>
            </div>
        </section>
    </div>
</div>
