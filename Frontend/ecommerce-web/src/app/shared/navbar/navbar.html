<p-dialog header="Deseja realmente sair da sua conta?" [modal]="true" [(visible)]="modalVisible" [style]="{ width: '30rem' }" [breakpoints]="{ '1199px': '75vw', '575px': '90vw' }">
    <div class="mt-1 d-flex justify-content-center gap-3">
        <p-button class="modal__button button_secondary" label="Cancelar" severity="secondary" (click)="closeModal()" />
        <p-button class="modal__button button_primary" label="Sair" (click)="logoutUser()" />
    </div>
</p-dialog>

<div class="w-100 d-flex justify-content-center content__container">
    <nav class="navbar navbar-expand-lg navbar-light navbar__container w-75">
        <section class="col-sm-3 d-flex justify-content-center">
            <img src="assets/logo.png" alt="Logo" class="logo">
        </section>
        <section class="col-sm-6 d-flex justify-content-center gap-3">
            <a class="navbar-brand navbar__home" href="#">Home</a>
            <a class="navbar-brand" href="#">Produtos</a>
            <a class="navbar-brand" href="#">Contato</a>
        </section>
        <section class="col-sm-3 d-flex justify-content-center gap-3">
            <p-menu #userMenu [model]="userMenuItems" popup="true"></p-menu>
            <a class="navbar-brand" (click)="userMenu.toggle($event)" style="cursor:pointer;">
                <i class="pi pi-user"></i>
                Account
                <i class="pi pi-angle-down" style="margin-left:4px;"></i>
            </a>
            <a class="navbar-brand" href="#">
                <i class="pi pi-shopping-cart"></i>
                Cart
            </a>
        </section>
    </nav>
</div>
